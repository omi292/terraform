# ============================================================
# CANARY DEPLOYMENT
# ============================================================
#
# Description:
# ------------
# Deploy a small number of Pods with the new version.
#
# Example:
#
# Stable Pods = 9
# Canary Pods = 1
#
# Approximately
#
# 90% Traffic → Stable
# 10% Traffic → Canary
#
# If successful:
#
# Increase Canary replicas
#
# Finally remove Stable Deployment.
#
# Downtime:
# ----------
# No
#
# Advantages:
# ------------
# ✔ Safe deployment
# ✔ Easy rollback
# ✔ Real user testing
#
# Disadvantages:
# ---------------
# ✘ Slightly complex
#
# Apply:
# kubectl apply -f canary.yaml
#
# ============================================================

# ============================================================
# STABLE DEPLOYMENT
# ============================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-stable

spec:

  # 90% Traffic
  replicas: 9

  selector:
    matchLabels:
      app: nginx
      version: stable

  template:

    metadata:
      labels:
        app: nginx
        version: stable

    spec:

      containers:
      - name: nginx

        image: nginx:1.25

        ports:
        - containerPort: 80

---
# ============================================================
# CANARY DEPLOYMENT
# ============================================================

apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-canary

spec:

  # 10% Traffic
  replicas: 1

  selector:
    matchLabels:
      app: nginx
      version: canary

  template:

    metadata:
      labels:
        app: nginx
        version: canary

    spec:

      containers:
      - name: nginx

        # New Version
        image: nginx:1.26

        ports:
        - containerPort: 80

---
# ============================================================
# SERVICE
# Sends traffic to BOTH Deployments
# ============================================================

apiVersion: v1
kind: Service

metadata:
  name: nginx-service

spec:

  selector:
    app: nginx

  ports:
  - port: 80
    targetPort: 80

  type: NodePort

# ============================================================
#
# Since both Deployments have:
#
# app: nginx
#
# The Service selects ALL Pods.
#
# Traffic Distribution:
#
# Stable Deployment = 9 Pods
#
# Canary Deployment = 1 Pod
#
# Kubernetes distributes requests approximately based
# on the number of available Pods.
#
# Rollback:
#
# kubectl delete deployment nginx-canary
#
# Promotion:
#
# Increase Canary replicas
#
# Reduce Stable replicas
#
# Finally delete Stable Deployment.
#
# ============================================================