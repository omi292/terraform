# ============================================================
# RECREATE DEPLOYMENT STRATEGY
# ============================================================
#
# Description:
# ------------
# Recreate strategy deletes ALL existing Pods first and then
# creates new Pods with the updated version.
#
# Downtime:
# ---------
# YES
#
# Use Case:
# ---------
# - Database applications
# - Legacy applications
# - Applications that cannot run multiple versions together
#
# Advantages:
# -----------
# ✔ Simple
# ✔ No version conflicts
#
# Disadvantages:
# --------------
# ✘ Causes downtime
#
# Apply:
# kubectl apply -f recreate.yaml
#
# Check Deployment:
# kubectl get deployment
#
# Check Pods:
# kubectl get pods
#
# Update Image:
# kubectl set image deployment/nginx-recreate nginx=nginx:1.26
#
# Rollout Status:
# kubectl rollout status deployment/nginx-recreate
#
# Rollback:
# kubectl rollout undo deployment/nginx-recreate
#
# ============================================================

apiVersion: apps/v1

# Resource type
kind: Deployment

metadata:

  # Deployment Name
  name: nginx-recreate

spec:

  # Number of Pods
  replicas: 3

  # Deployment Strategy
  strategy:

    # Delete all old Pods before creating new Pods
    type: Recreate

  # Deployment manages Pods having this label
  selector:
    matchLabels:
      app: nginx

  # Pod Template
  template:

    metadata:

      # Labels assigned to every Pod
      labels:
        app: nginx

    spec:

      containers:

      - name: nginx

        # Docker Image
        image: nginx:1.25

        # Container Port
        ports:
        - containerPort: 80

        # Resource Requests
        resources:

          requests:
            cpu: "100m"
            memory: "128Mi"

          # Resource Limits
          limits:
            cpu: "500m"
            memory: "512Mi"